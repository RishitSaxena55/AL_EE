name: al_ee
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.8
  - pip
  - pip:
    # PyTorch for CUDA 11.5 (matches nvcc 11.5.r11.5)
    - torch==1.11.0+cu115
    - torchvision==0.12.0+cu115
    --extra-index-url https://download.pytorch.org/whl/cu115
    # Core
    - numpy>=1.21.0
    - scikit-learn>=1.0.0
    - scipy>=1.7.0
    - Pillow>=8.3.0
    - opencv-python>=4.5.0
    # Logging
    - tensorboard>=2.8.0
    - tqdm>=4.62.0
    - pyyaml>=5.4.0
    # Testing
    - pytest>=7.0.0
